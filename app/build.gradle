plugins {
    id 'com.android.application'
}

android {
    namespace "com.sharex.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.sharex.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.10.0'
}