<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{
margin:0;
background:linear-gradient(135deg,#14071f,#2b1055);

font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;

.logo{font-size:36px;font-weight:900}

}
